# =============================================================================
# PT Dashboard — application.properties
# =============================================================================
# Phase 1 scaffold. Real values for runtime config are supplied via env vars.
# No secrets are committed to the repo.
# =============================================================================

# ---- HTTP ----
# Port 8081 in dev because the SDLC webhook server occupies 8080 on this host.
quarkus.http.port=${HTTP_PORT:8081}

# ---- Datasource -----------------------------------------------------------
# The runtime data access layer (PTD-5 / PTD-6 — Hibernate Reactive Panache
# + reactive-pg-client) reads `quarkus.datasource.reactive.url`. Flyway
# (PTD-3) uses a JDBC-compatible URL stored in `quarkus.datasource.jdbc.url`
# so the two can coexist without forcing a fallback to JDBC. When the JDBC
# URL is left blank (e.g. local smoke tests without Postgres) Flyway is
# disabled via `quarkus.flyway.migrate-at-start=false`.
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:ptdashboard}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:ptdashboard}

# Reactive URL — required by Hibernate Reactive Panache (PTD-5+).
quarkus.datasource.reactive.url=${QUARKUS_DATASOURCE_REACTIVE_URL:postgresql://localhost:5432/ptdashboard}

# JDBC URL — required by Flyway (PTD-3). Blank by default to keep the
# smoke-test boot path (no Postgres needed); set `QUARKUS_DATASOURCE_JDBC_URL`
# in dev / CI to enable migrations.
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:}

# ---- Flyway migrations (PTD-3) -------------------------------------------
# Auto-apply V1__init.sql on startup when a JDBC URL is provided. The flag is
# intentionally tied to the JDBC URL: leaving the URL blank disables Flyway
# without requiring a second knob.
quarkus.flyway.migrate-at-start=${QUARKUS_FLYWAY_MIGRATE_AT_START:false}
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0

# No JPA entities exist in Phase 1, so Hibernate schema generation stays off.
quarkus.hibernate-orm.database.generation=none

# ---- Firebase Admin SDK (token verification wired in PTD-4) ----
# These two env vars are required in any environment that serves protected
# paths (i.e. everywhere except local smoke tests). The service-account
# JSON file MUST NEVER be committed to the repo — see `.gitignore` for the
# patterns that exclude `*-firebase-adminsdk-*.json` and
# `firebase-service-account*.json`.
#
# When either variable is missing/blank, FirebaseAppLifecycle logs a
# single warning at boot and the FirebaseAuthFilter rejects every
# protected request with 401 (`auth_unavailable`). This is intentional —
# we never accidentally grant access just because secrets are missing.
firebase.project-id=${FIREBASE_PROJECT_ID:}
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:}

# ---- Logging ----
quarkus.log.level=INFO
quarkus.log.category."com.faworkshop.ptdashboard".level=DEBUG
