# =============================================================================
# PT Dashboard — application.properties
# =============================================================================
# Phase 1 scaffold. Real values for runtime config are supplied via env vars.
# No secrets are committed to the repo.
# =============================================================================

# ---- HTTP ----
# Port 8081 in dev because the SDLC webhook server occupies 8080 on this host.
quarkus.http.port=${HTTP_PORT:8081}

# ---- Datasource (placeholder; no migrations yet — V1__init.sql added in PTD-3) ----
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:ptdashboard}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:ptdashboard}

# Datasource URL is supplied at runtime via QUARKUS_DATASOURCE_REACTIVE_URL.
# No JPA entities exist in Phase 1, so the URL is not actually parsed here; the
# default below matches the README so the value is well-formed for PTD-3.
quarkus.datasource.reactive.url=${QUARKUS_DATASOURCE_REACTIVE_URL:postgresql://localhost:5432/ptdashboard}

# ---- Hibernate Reactive (no entities yet — added in PTD-3) ----
# Left in default config so the extension is available; schema generation
# stays disabled because no @Entity classes exist in Phase 1.
quarkus.hibernate-orm.database.generation=none

# ---- Firebase Admin SDK (placeholder; token verification wired in PTD-4) ----
# These keys are documented for Phase 4 wiring. PTD-2 only adds the dependency;
# Quarkus does not yet ship a quarkus-firebase extension, so these keys will warn
# at dev-time — that is expected and non-blocking.
firebase.project-id=${FIREBASE_PROJECT_ID:pt-dashboard-dev}
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:}

# ---- Logging ----
quarkus.log.level=INFO
quarkus.log.category."com.faworkshop.ptdashboard".level=DEBUG
